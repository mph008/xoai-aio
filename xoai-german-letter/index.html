<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deutsch Start – Lernen mit Spiel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Baloo+2:wght@700;800&family=Bangers&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #818cf8;
            --primary-dark: #6366f1;
            --secondary: #42a5f5;
            --success: #22c55e;
            --error: #ef4444;
            --card-bg: rgba(255,255,255,0.05);
            --text: #f1f5f9;
            --muted: rgba(255,255,255,0.45);
            --radius: 18px;
            --shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        body {
            font-family: 'Nunito', 'Segoe UI', system-ui, sans-serif;
            min-height: 100dvh;
            background: #060618;
            background-image:
                radial-gradient(ellipse 70% 50% at 15% 10%, rgba(99,102,241,.18) 0%, transparent 55%),
                radial-gradient(ellipse 60% 45% at 85% 85%, rgba(236,72,153,.13) 0%, transparent 55%),
                radial-gradient(ellipse 50% 50% at 50% 50%, rgba(34,197,94,.06) 0%, transparent 65%);
            color: var(--text);
            overflow-x: hidden;
        }

        /* ===== SCREENS ===== */
        .screen { display: none; flex-direction: column; align-items: center; min-height: 100dvh; padding: 20px 16px 40px; position: relative; z-index: 1; }
        .screen.active { display: flex; }

        /* ===== HOME ===== */
        #screen-home { justify-content: center; gap: 24px; }
        .home-mascot { font-size: 6rem; animation: bounce 2s ease-in-out infinite; }
        @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
        .home-title {
            font-family: 'Bangers', sans-serif;
            font-size: 2.8rem;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #818cf8, #a78bfa, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            line-height: 1.2;
        }
        .home-subtitle { font-size: 1rem; color: var(--muted); text-align: center; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }

        /* ===== LEVEL MAP ===== */
        #screen-map { gap: 0; }
        .map-header {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .map-title {
            font-family: 'Bangers', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #818cf8, #a78bfa, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            flex: 1;
            text-align: center;
        }
        .progress-bar-wrap {
            width: 100%;
            max-width: 480px;
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            height: 7px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #818cf8, #ec4899);
            border-radius: 20px;
            transition: width 0.55s cubic-bezier(.4,0,.2,1);
        }
        .levels-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 480px;
        }
        .level-btn {
            aspect-ratio: 1;
            border-radius: 50%;
            border: 2px solid rgba(220,38,38,0.3);
            font-family: 'Baloo 2', sans-serif;
            font-size: 1.3rem;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            position: relative;
            background: rgba(255,255,255,0.06);
            color: var(--text);
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 4px 0 rgba(0,0,0,0.4);
        }
        .level-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.4); }
        .level-btn:hover  { background: rgba(129,140,248,0.2); border-color: rgba(129,140,248,0.6); transform: translateY(-2px) scale(1.05); }
        .level-btn.done   { background: rgba(34,197,94,0.25); border-color: rgba(34,197,94,0.6); color: #86efac; }
        .level-btn.stars3 { background: rgba(253,230,138,0.2); border-color: rgba(253,230,138,0.6); color: #fde68a; box-shadow: 0 4px 12px rgba(253,230,138,0.2); }
        .level-btn.current { background: rgba(129,140,248,0.35); border-color: rgba(129,140,248,0.8); color: #c7d2fe; animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse { 0%,100%{box-shadow:0 4px 0 rgba(0,0,0,0.4),0 0 0 0 rgba(129,140,248,0.5)} 50%{box-shadow:0 4px 0 rgba(0,0,0,0.4),0 0 0 10px rgba(129,140,248,0)} }
        .level-btn .lv-num { font-size: 1.3rem; line-height: 1; }
        .level-btn .lv-stars { font-size: 0.75rem; letter-spacing: -2px; }
        .stage-label {
            width: 100%;
            max-width: 480px;
            font-size: 0.74rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: rgba(129,140,248,0.65);
            margin-top: 18px;
            margin-bottom: 6px;
        }

        /* ===== GAME SCREEN ===== */
        #screen-game { gap: 16px; }
        .game-top {
            width: 100%;
            max-width: 480px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-back {
            background: rgba(255,255,255,0.06);
            border: 1.5px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.7);
            border-radius: 50%;
            width: 40px; height: 40px;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: background 0.15s, border-color 0.15s;
        }
        .btn-back:hover { background: rgba(129,140,248,0.2); border-color: rgba(129,140,248,0.5); }
        .game-progress {
            flex: 1;
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            height: 7px;
            overflow: hidden;
        }
        .game-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #818cf8, #ec4899);
            border-radius: 20px;
            transition: width 0.4s ease;
        }
        .game-lives { display: flex; gap: 3px; font-size: 1.4rem; flex-shrink: 0; }

        .game-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1.5px solid rgba(255,255,255,0.12);
            border-radius: var(--radius);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            padding: 28px 24px;
            width: 100%;
            max-width: 480px;
            text-align: center;
        }
        .game-question {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--muted);
            margin-bottom: 16px;
        }
        .big-letter {
            font-family: 'Bangers', sans-serif;
            font-size: 5.5rem;
            background: linear-gradient(135deg, #818cf8, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin: 8px 0 16px;
        }
        .big-image { font-size: 5rem; margin: 8px 0 16px; line-height: 1; }
        .word-display {
            font-family: 'Bangers', sans-serif;
            font-size: 2.8rem;
            letter-spacing: 8px;
            background: linear-gradient(135deg, #818cf8, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 8px 0 16px;
        }

        /* Audio button */
        .btn-audio {
            width: 70px; height: 70px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            margin: 8px auto 20px;
            display: flex; align-items: center; justify-content: center;
            animation: audioPulse 2s ease-in-out infinite;
            box-shadow: 0 4px 20px rgba(99,102,241,0.5);
        }
        @keyframes audioPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }

        /* Answer options */
        .options-grid { display: grid; gap: 10px; width: 100%; }
        .options-grid.cols-2 { grid-template-columns: 1fr 1fr; }
        .options-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

        .option-btn {
            border: 2px solid rgba(255,255,255,0.12);
            border-radius: 14px;
            background: rgba(255,255,255,0.07);
            font-family: 'Baloo 2', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            color: var(--text);
            cursor: pointer;
            padding: 14px 10px;
            transition: background 0.15s, border-color 0.15s, transform 0.1s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .option-btn:hover:not(:disabled) { background: rgba(129,140,248,0.2); border-color: rgba(129,140,248,0.6); transform: translateY(-3px) scale(1.03); }
        .option-btn.correct { background: rgba(34,197,94,0.25); border-color: #22c55e; color: #86efac; animation: bounceIn 0.4s ease; }
        .option-btn.wrong   { background: rgba(239,68,68,0.2);   border-color: #ef4444; color: #fca5a5; animation: shake 0.4s ease; }
        @keyframes bounceIn { 0%{transform:scale(.75)} 60%{transform:scale(1.12)} 100%{transform:scale(1)} }
        @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-9px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
        .option-btn:disabled { cursor: default; }

        /* Drag & Drop word builder */
        .letter-slots { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; }
        .letter-slot {
            width: 52px; height: 62px;
            border: 2.5px dashed rgba(129,140,248,0.4);
            border-radius: 10px;
            font-family: 'Baloo 2', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            display: flex; align-items: center; justify-content: center;
            color: #a5b4fc;
            background: rgba(255,255,255,0.04);
            transition: border-color 0.2s, background 0.2s;
        }
        .letter-slot.filled      { border-style: solid; border-color: #818cf8; background: rgba(129,140,248,0.12); }
        .letter-slot.correct-slot { border-color: #22c55e; background: rgba(34,197,94,0.15); color: #86efac; }
        .letter-slot.wrong-slot   { border-color: #ef4444; background: rgba(239,68,68,0.15); color: #fca5a5; }
        .letter-pool { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
        .pool-letter {
            width: 52px; height: 62px;
            border-radius: 10px;
            border: 2px solid rgba(236,72,153,0.5);
            background: rgba(236,72,153,0.12);
            font-family: 'Baloo 2', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            color: #f9a8d4;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.1s, background 0.15s;
        }
        .pool-letter:hover { background: rgba(236,72,153,0.25); transform: translateY(-3px) scale(1.08); }
        .pool-letter.used { opacity: 0.2; cursor: default; pointer-events: none; }

        /* Missing letter input */
        .missing-word-display { display: flex; gap: 6px; justify-content: center; align-items: center; margin-bottom: 16px; }
        .missing-char {
            font-family: 'Bangers', sans-serif;
            font-size: 2.8rem;
            color: var(--text);
        }
        .missing-blank {
            width: 56px; height: 70px;
            border: none;
            border-bottom: 4px solid #818cf8;
            font-family: 'Bangers', sans-serif;
            font-size: 2.8rem;
            color: #a5b4fc;
            text-align: center;
            background: transparent;
            outline: none;
            caret-color: #818cf8;
        }

        /* Maze */
        .maze-grid { display: grid; gap: 8px; margin: 0 auto 16px; }
        .maze-cell {
            width: 64px; height: 64px;
            border-radius: 12px;
            font-family: 'Baloo 2', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.06);
            color: var(--text);
            transition: all 0.15s;
        }
        .maze-cell:hover      { background: rgba(129,140,248,0.2); border-color: rgba(129,140,248,0.5); transform: scale(1.06); }
        .maze-cell.selected   { background: rgba(129,140,248,0.4); color: #fff; border-color: #818cf8; }
        .maze-cell.correct-path { background: rgba(34,197,94,0.35); color: #fff; border-color: #22c55e; }
        .maze-cell.wrong-path   { background: rgba(239,68,68,0.35); color: #fff; border-color: #ef4444; animation: shake 0.4s ease; }
        .maze-cell.blocked      { background: rgba(255,255,255,0.02); color: rgba(255,255,255,0.12); cursor: default; }

        /* Anagram */
        .anagram-pool  { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; min-height: 80px; align-items: center; }
        .anagram-built { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; min-height: 80px; align-items: center; border-top: 2px dashed rgba(255,255,255,0.15); padding-top: 12px; }
        .ana-tile {
            width: 52px; height: 62px;
            border-radius: 10px;
            font-family: 'Baloo 2', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .ana-tile.pool-tile  { background: rgba(59,130,246,0.15); border: 2px solid rgba(59,130,246,0.5); color: #93c5fd; }
        .ana-tile.built-tile { background: rgba(129,140,248,0.15); border: 2px solid rgba(129,140,248,0.6); color: #a5b4fc; }
        .ana-tile:hover { transform: scale(1.08); }
        .ana-tile.empty-slot { background: rgba(255,255,255,0.03); border: 2px dashed rgba(255,255,255,0.1); color: transparent; cursor: default; }

        /* Story */
        .story-text { font-size: 1.6rem; font-weight: 800; line-height: 1.7; color: var(--text); margin-bottom: 16px; }
        .story-blank {
            display: inline-flex; align-items: center; justify-content: center;
            min-width: 80px; height: 44px;
            border-bottom: 3px solid #818cf8;
            color: #a5b4fc;
            font-family: 'Bangers', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 2px;
            vertical-align: middle;
            padding: 0 4px;
        }

        /* Feedback overlay */
        .feedback-overlay {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: rgba(6,6,24,0.75);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .feedback-overlay.show { opacity: 1; pointer-events: all; }
        .feedback-box {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1.5px solid rgba(255,255,255,0.15);
            border-radius: 24px;
            padding: 36px 40px;
            text-align: center;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; align-items: center; gap: 12px;
        }
        .feedback-icon { font-size: 4rem; }
        .feedback-title { font-family: 'Bangers', sans-serif; font-size: 2rem; letter-spacing: 3px; color: var(--text); }
        .feedback-sub { font-size: 1rem; color: var(--muted); }

        /* Level complete overlay */
        .levelcomplete-overlay {
            position: fixed; inset: 0;
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            background: rgba(6,6,24,0.9);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            z-index: 200;
            gap: 12px;
        }
        .levelcomplete-overlay.show { display: flex; }
        .lc-icon  { font-size: 5rem; animation: bounce 1s infinite; }
        .lc-title {
            font-family: 'Bangers', sans-serif; font-size: 2.4rem; letter-spacing: 3px;
            background: linear-gradient(135deg, #818cf8, #a78bfa, #ec4899);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            text-align: center;
        }
        .lc-stars { font-size: 3rem; letter-spacing: 6px; margin: 4px 0; }
        .lc-word  { font-size: 1rem; color: var(--muted); text-align: center; font-weight: 700; }

        /* Buttons */
        .btn {
            border: none;
            border-radius: 50px;
            font-family: 'Baloo 2', sans-serif;
            font-weight: 800;
            cursor: pointer;
            outline: none;
            transition: transform 0.1s, box-shadow 0.1s;
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:active { transform: scale(.94); }
        .btn:hover:not(:active) { transform: translateY(-3px) scale(1.03); }
        .btn-primary  { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; font-size: 1.2rem; padding: 16px 36px; box-shadow: 0 4px 20px rgba(99,102,241,0.45); }
        .btn-success  { background: rgba(34,197,94,0.25); border: 2px solid rgba(34,197,94,0.5); color: #86efac; font-size: 1.1rem; padding: 14px 32px; }
        .btn-secondary { background: rgba(99,102,241,0.2); border: 2px solid rgba(99,102,241,0.5); color: #a5b4fc; font-size: 1.1rem; padding: 14px 32px; }
        .btn-check { background: linear-gradient(135deg, #818cf8, #a78bfa); color: #fff; font-size: 1.1rem; padding: 14px 36px; box-shadow: 0 4px 16px rgba(129,140,248,0.4); width: 100%; max-width: 300px; }

        /* Stage pills */
        .stage-pill {
            display: inline-block;
            padding: 4px 16px;
            border-radius: 50px;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        .stage-1 { background: rgba(59,130,246,0.15);  color: #93c5fd; border: 1px solid rgba(59,130,246,0.35); }
        .stage-2 { background: rgba(239,68,68,0.15);   color: #fca5a5; border: 1px solid rgba(239,68,68,0.35); }
        .stage-3 { background: rgba(34,197,94,0.15);   color: #86efac; border: 1px solid rgba(34,197,94,0.35); }
        .stage-4 { background: rgba(168,85,247,0.15);  color: #d8b4fe; border: 1px solid rgba(168,85,247,0.35); }

        /* Responsive */
        @media (max-width: 400px) {
            .levels-grid { grid-template-columns: repeat(5, 1fr); gap: 6px; max-width: 100%; }
            .level-btn .lv-num { font-size: 1rem; }
            .level-btn .lv-stars { font-size: 0.6rem; }
            .big-letter  { font-size: 4rem; }
            .word-display { font-size: 2.2rem; letter-spacing: 4px; }
            .option-btn  { font-size: 1.6rem; padding: 12px 6px; }
            .letter-slot, .pool-letter, .ana-tile { width: 44px; height: 54px; font-size: 1.6rem; }
            .missing-blank, .missing-char { font-size: 2.2rem; }
            .maze-cell   { width: 54px; height: 54px; font-size: 1.7rem; }
        }
    </style>
</head>
<body>

<!-- ========== HOME ========== -->
<div id="screen-home" class="screen active">
    <div class="home-mascot">🦊</div>
    <div class="home-title">Xoài học chữ cái tiếng Đức</div>
    <button class="btn btn-primary" style="margin-top:24px" onclick="showMap()">🚀 Bắt đầu</button>
</div>

<!-- ========== MAP ========== -->
<div id="screen-map" class="screen">
    <div class="map-header">
        <button class="btn-back" onclick="showScreen('screen-home')">⟵</button>
        <div class="map-title">🗺️ Chọn bài học</div>
    </div>
    <div class="progress-bar-wrap" style="max-width:380px">
        <div class="progress-bar-fill" id="map-progress-bar" style="width:0%"></div>
    </div>
    <div id="levels-container" style="width:100%;max-width:420px"></div>
</div>

<!-- ========== GAME ========== -->
<div id="screen-game" class="screen">
    <div class="game-top" id="game-top">
        <button class="btn-back" onclick="exitToMap()">⟵</button>
        <div class="game-progress"><div class="game-progress-fill" id="q-progress" style="width:0%"></div></div>
        <div class="game-lives" id="lives-display"></div>
    </div>
    <div class="game-card" id="game-card">
        <!-- injected by JS -->
    </div>
    <button class="btn btn-check" id="btn-check" style="display:none" onclick="checkAnswer()">✔ Prüfen</button>
</div>

<!-- ========== FEEDBACK ========== -->
<div class="feedback-overlay" id="feedback-overlay">
    <div class="feedback-box">
        <div class="feedback-icon" id="fb-icon"></div>
        <div class="feedback-title" id="fb-title"></div>
        <div class="feedback-sub" id="fb-sub"></div>
    </div>
</div>

<!-- ========== LEVEL COMPLETE ========== -->
<div class="levelcomplete-overlay" id="lc-overlay">
    <div class="lc-icon">⭐</div>
    <div class="lc-title" id="lc-title">Super gemacht!</div>
    <div class="lc-stars" id="lc-stars">⭐⭐⭐</div>
    <div class="lc-word" id="lc-word"></div>
    <div style="display:flex;gap:16px;margin-top:24px;flex-wrap:wrap;justify-content:center">
        <button class="btn btn-secondary" onclick="repeatLevel()">🔄 Làm lại</button>
        <button class="btn btn-success" id="btn-next-level" onclick="nextLevel()">▶ Tiếp theo</button>
    </div>
</div>

<script>
// =====================================================
//  DATA
// =====================================================

// Vocabulary sets (word, emoji, category)

    animals: [

// =====================================================
//  SCREENS
// =====================================================
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0,0);
}

function showMap() {
    renderMap();
    showScreen('screen-map');
}

function exitToMap() {
    showMap();
}

// =====================================================
//  MAP
// =====================================================
function renderMap() {
    const container = document.getElementById('levels-container');
    const done = LEVELS.filter(l => state.progress[l.id]?.stars > 0).length;
    document.getElementById('map-progress-bar').style.width = (done / LEVELS.length * 100) + '%';

    let html = '';
    let lastStage = 0;
    const firstUndone = (LEVELS.find(l => !state.progress[l.id]?.stars) || LEVELS[0]).id;
    LEVELS.forEach(lv => {
        if (lv.stage !== lastStage) {
            if (lastStage > 0) html += '</div>';
            html += `<div class="stage-label">${STAGE_NAMES[lv.stage]}</div>`;
            html += '<div class="levels-grid">';
            lastStage = lv.stage;
        }
        const prog = state.progress[lv.id];
        const stars = prog?.stars || 0;

        let cls = '';
        if (stars >= 3) cls = 'stars3';
        else if (stars > 0) cls = 'done';
        else if (!state.progress[lv.id]?.stars) cls = lv.id === firstUndone ? 'current' : '';

        const starsHtml = stars > 0 ? `<span class="lv-stars">${'⭐'.repeat(stars)}</span>` : '';
        html += `<button class="level-btn ${cls}" onclick="startLevel(${lv.id})" title="${lv.title}">
            <span class="lv-num">${lv.id}</span>
            ${starsHtml}
        </button>`;
    });
    html += '</div>';
    container.innerHTML = html;
}

// =====================================================
//  LEVEL START
// =====================================================
function startLevel(id) {
    const lv = LEVELS.find(l => l.id === id);
    state.currentLevel = lv;
    state.roundIndex = 0;
    state.errors = 0;
    state.lives = 3;
    state.rounds = buildRounds(lv);
    showScreen('screen-game');
    renderLives();
    renderRound();
}

function buildRounds(lv) {
    const rounds = [];
    const count = lv.rounds;
    switch (lv.type) {
        case 'choose-letter':
            for (let i = 0; i < count; i++) rounds.push({ target: pick(lv.letters) });
            break;
        case 'hear-letter':
            for (let i = 0; i < count; i++) rounds.push({ target: pick(lv.letters) });
            break;
        case 'anlaut': {
            const wds = shuffle([...lv.words]).slice(0, count);
            wds.forEach(w => rounds.push({ wordKey: w }));
            break;
        }
        case 'build-word': {
            const wds = shuffle([...lv.words]).slice(0, count);
            wds.forEach(w => rounds.push({ wordKey: w }));
            break;
        }
        case 'missing-letter': {
            const wds = shuffle([...lv.words]).slice(0, count);
            wds.forEach(w => {
                const idx = randInt(0, w.length - 1);
                rounds.push({ wordKey: w, missingIdx: idx });
            });
            break;
        }
        case 'hear-word': {
            const wds = shuffle([...lv.words]).slice(0, count);
            wds.forEach(w => rounds.push({ wordKey: w }));
            break;
        }
        case 'maze': {
            const wds = shuffle([...lv.words]).slice(0, count);
            wds.forEach(w => rounds.push({ wordKey: w }));
            break;
        }
        case 'anagram': {
            const wds = shuffle([...lv.words]).slice(0, count);
            wds.forEach(w => rounds.push({ wordKey: w }));
            break;
        }
        case 'story': {
            const sts = shuffle([...lv.stories]).slice(0, count);
            sts.forEach(s => rounds.push({ story: s }));
            break;
        }
    }
    return rounds;
}

// =====================================================
//  RENDER ROUND
// =====================================================
function renderRound() {
    const lv = state.currentLevel;
    const round = state.rounds[state.roundIndex];
    const total = state.rounds.length;
    document.getElementById('q-progress').style.width = (state.roundIndex / total * 100) + '%';

    const card = document.getElementById('game-card');
    const checkBtn = document.getElementById('btn-check');
    checkBtn.style.display = 'none';
    state.pendingAnswer = null;
    state.dragSlots = [];
    state.dragBuilt = [];
    state.mazeSelected = [];
    state.anagramPool = [];
    state.anagramBuilt = [];

    const stageEmojis = { 1:'🌱', 2:'🌿', 3:'📖', 4:'🧩' };

    switch (lv.type) {
        case 'choose-letter': renderChooseLetter(card, round, lv); break;
        case 'hear-letter':   renderHearLetter(card, round, lv); break;
        case 'anlaut':        renderAnlaut(card, round, lv); break;
        case 'build-word':    renderBuildWord(card, round, lv); break;
        case 'missing-letter':renderMissingLetter(card, round, lv); break;
        case 'hear-word':     renderHearWord(card, round, lv); break;
        case 'maze':          renderMaze(card, round, lv); break;
        case 'anagram':       renderAnagram(card, round, lv); break;
        case 'story':         renderStory(card, round, lv); break;
    }

    renderLives();
}

// --- GAME 1: Choose Letter ---
function renderChooseLetter(card, round, lv) {
    const target = round.target;
    const others = shuffle(LETTERS.filter(l => l !== target)).slice(0, 3);
    const options = shuffle([target, ...others]);

    card.innerHTML = `
        <div class="stage-pill ${STAGE_COLORS[lv.stage]}">Nhận diện chữ</div>
        <div class="game-question">Hãy chọn chữ <strong>${target}</strong></div>
        <div class="options-grid cols-2">
            ${options.map(o => `<button class="option-btn" onclick="selectOptionLetter(this,'${o}','${target}')">${o}</button>`).join('')}
        </div>
    `;
}

function selectOptionLetter(btn, chosen, target) {
    disableOptions();
    if (chosen === target) {
        btn.classList.add('correct');
        showFeedback(true, target);
        setTimeout(() => { hideFeedback(); nextRound(); }, 1200);
    } else {
        btn.classList.add('wrong');
        state.errors++;
        loseLife();
        const correct = document.querySelector('.option-btn:not(.wrong)');
        // highlight correct
        document.querySelectorAll('.option-btn').forEach(b => {
            if (b.textContent.trim() === target) b.classList.add('correct');
        });
        showFeedback(false, target);
        setTimeout(() => { hideFeedback(); nextRound(); }, 1600);
    }
}

// --- GAME 2: Hear Letter ---
function renderHearLetter(card, round, lv) {
    const target = round.target;
    const others = shuffle(lv.letters.filter(l => l !== target)).slice(0, 2);
    const extra = shuffle(LETTERS.filter(l => !lv.letters.includes(l))).slice(0,1);
    const options = shuffle([target, ...others, ...extra]).slice(0,4);

    card.innerHTML = `
        <div class="stage-pill ${STAGE_COLORS[lv.stage]}">Nghe → Chọn chữ</div>
        <div class="game-question">Nghe và chọn chữ đúng</div>

            ${options.map(o => `<button class="option-btn" onclick="selectOptionLetter(this,'${o}','${target}')">${o}</button>`).join('')}
        </div>
    `;
    setTimeout(() => speakLetter(target), 400);
}

// --- GAME 4: Build Word ---
function renderBuildWord(card, round, lv) {
    const wordKey = round.wordKey;
    const wd = findWord(wordKey);
    const letters = wordKey.split('');
    const pool = shuffle([...letters]);
    state.dragSlots = Array(letters.length).fill(null);
    state.dragPool  = [...pool];
    state.dragTarget = wordKey;

    card.innerHTML = `
        <div class="stage-pill ${STAGE_COLORS[lv.stage]}">Ghép từ</div>
        <div class="game-question">Ghép chữ thành từ: <strong>${wd.t}</strong></div>
        <div class="big-image" style="margin-bottom:8px">${wd.e}</div>
        <div class="letter-slots" id="letter-slots">
            ${letters.map((_,i) => `<div class="letter-slot" id="slot-${i}" onclick="slotClick(${i})"></div>`).join('')}
        </div>
        <div class="letter-pool" id="letter-pool">
            ${pool.map((l,i) => `<div class="pool-letter" id="pool-${i}" onclick="poolClick(${i})">${l}</div>`).join('')}
        </div>
    `;
    document.getElementById('btn-check').style.display = 'flex';
}

function poolClick(i) {
    if (state.dragPool[i] === null) return; // already used
    const letter = state.dragPool[i];
    // find first empty slot
    const emptyIdx = state.dragSlots.findIndex(s => s === null);
    if (emptyIdx === -1) return;
    state.dragSlots[emptyIdx] = { poolIdx: i, letter };
    state.dragPool[i] = null;
    updateBuildUI();
}

function slotClick(i) {
    if (state.dragSlots[i] === null) return;
    const { poolIdx, letter } = state.dragSlots[i];
    state.dragSlots[i] = null;
    state.dragPool[poolIdx] = letter;
    updateBuildUI();
}

function updateBuildUI() {
    state.dragSlots.forEach((s, i) => {
        const el = document.getElementById(`slot-${i}`);
        if (s) { el.textContent = s.letter; el.classList.add('filled'); }
        else   { el.textContent = ''; el.classList.remove('filled'); }
    });
    state.dragPool.forEach((l, i) => {
        const el = document.getElementById(`pool-${i}`);
        if (!el) return;
        if (l === null) el.classList.add('used');
        else el.classList.remove('used');
    });
}

function checkBuildWord() {
    const built = state.dragSlots.map(s => s?.letter || '').join('');
    const target = state.dragTarget;
    const slots = document.querySelectorAll('.letter-slot');
    if (built === target) {
        slots.forEach(s => s.classList.add('correct-slot'));
        showFeedback(true, target);
        setTimeout(() => { hideFeedback(); nextRound(); }, 1300);
    } else {
        state.errors++;
        loseLife();
        slots.forEach((s, i) => {
            if (state.dragSlots[i]?.letter === target[i]) s.classList.add('correct-slot');
            else if (state.dragSlots[i]) s.classList.add('wrong-slot');
        });
        showFeedback(false, target);
        setTimeout(() => {
            hideFeedback();
            slots.forEach(s => s.classList.remove('correct-slot','wrong-slot'));
        }, 1600);
    }
}

// --- GAME 5: Missing Letter ---
function renderMissingLetter(card, round, lv) {
    const wordKey = round.wordKey;
    const wd = findWord(wordKey);
    const idx = round.missingIdx;
    const answer = wordKey[idx];
    state.pendingAnswer = answer.toLowerCase();
    state.missingTarget = answer;

    card.innerHTML = `
        <div class="stage-pill ${STAGE_COLORS[lv.stage]}">Chữ thiếu</div>
        <div class="game-question">Điền chữ còn thiếu</div>
        <div class="big-image">${wd.e}</div>
        <div class="missing-word-display" id="missing-display">
            ${wordKey.split('').map((c, i) =>
                i === idx
                    ? `<input class="missing-blank" id="missing-input" maxlength="1" autocomplete="off" autocorrect="off" spellcheck="false" oninput="missingInput(this)">`
                    : `<span class="missing-char">${c}</span>`
            ).join('')}
        </div>
    `;
    document.getElementById('btn-check').style.display = 'flex';
    setTimeout(() => document.getElementById('missing-input')?.focus(), 300);
}

function missingInput(el) {
    el.value = el.value.toUpperCase().slice(-1);
}

function checkMissingLetter() {
    const input = document.getElementById('missing-input');
    if (!input) return;
    const val = input.value.toUpperCase();
    const answer = state.missingTarget;
    if (val === answer) {
        input.style.borderBottomColor = 'var(--success)';
        input.style.color = 'var(--success)';
        showFeedback(true, state.dragTarget || answer);
        setTimeout(() => { hideFeedback(); nextRound(); }, 1300);
    } else {
        state.errors++;
        loseLife();
        input.style.borderBottomColor = 'var(--error)';
        input.style.color = 'var(--error)';
        showFeedback(false, answer);
        setTimeout(() => {
            hideFeedback();
            input.value = '';
            input.style.borderBottomColor = 'var(--primary)';
            input.style.color = 'var(--primary)';
        }, 1600);
    }
}

// --- GAME 7: Maze ---
function renderMaze(card, round, lv) {
    const wordKey = round.wordKey;
    const wd = findWord(wordKey);
    const target = wordKey.split('');
    // Build 4x4 grid: place target letters in random path, fill rest with random letters
    const SIZE = 4;
    const gridLetters = Array(SIZE * SIZE).fill(null);
    // Random path
    const pathCells = [];
    let row = 0, col = 0;
    pathCells.push(row * SIZE + col);
    for (let i = 1; i < target.length; i++) {
        const neighbors = getNeighbors(row, col, SIZE).filter(n => !pathCells.includes(n));
        if (!neighbors.length) break;
        const n = pick(neighbors);
        pathCells.push(n);
        row = Math.floor(n / SIZE);
        col = n % SIZE;
    }
    target.forEach((l, i) => { if (pathCells[i] !== undefined) gridLetters[pathCells[i]] = l; });
    // Fill blanks
    const extra = shuffle(LETTERS.filter(l => !target.includes(l)));
    let ei = 0;
    for (let i = 0; i < SIZE * SIZE; i++) { if (!gridLetters[i]) gridLetters[i] = extra[ei++] || 'X'; }

    state.mazeTarget   = [...pathCells];
    state.mazeSelected = [];
    state.mazeGrid     = gridLetters;
    state.mazePath     = pathCells;

    card.innerHTML = `
        <div class="stage-pill ${STAGE_COLORS[lv.stage]}">Mê cung chữ</div>
        <div class="game-question">Chọn các chữ theo thứ tự để tạo từ: <strong>${wd.t}</strong> ${wd.e}</div>
        <div style="font-family:'Baloo 2';font-size:1.4rem;font-weight:800;color:var(--secondary);margin-bottom:10px;letter-spacing:4px">${wordKey.split('').join(' → ')}</div>
        <div class="maze-grid" style="grid-template-columns:repeat(${SIZE},64px);justify-content:center" id="maze-grid">
            ${gridLetters.map((l, i) => `<div class="maze-cell" id="maze-${i}" onclick="mazeClick(${i})">${l}</div>`).join('')}
        </div>
    `;
    document.getElementById('btn-check').style.display = 'flex';
}

function getNeighbors(row, col, size) {
    const result = [];
    if (row > 0) result.push((row-1)*size+col);
    if (row < size-1) result.push((row+1)*size+col);
    if (col > 0) result.push(row*size+col-1);
    if (col < size-1) result.push(row*size+col+1);
    return result;
}

function mazeClick(i) {
    const cell = document.getElementById(`maze-${i}`);
    const targetPath = state.mazePath.slice(0, state.mazeTarget.length);
    const nextExpected = targetPath[state.mazeSelected.length];

    if (i === nextExpected) {
        state.mazeSelected.push(i);
        cell.classList.add('selected');
        if (state.mazeSelected.length === targetPath.length) {
            // all correct
            state.mazeSelected.forEach(idx => {
                document.getElementById(`maze-${idx}`).classList.replace('selected','correct-path');
            });
            showFeedback(true, state.rounds[state.roundIndex].wordKey);
            setTimeout(() => { hideFeedback(); nextRound(); }, 1300);
        }
    } else {
        state.errors++;
        loseLife();
        cell.classList.add('wrong-path');
        // reset selection
        state.mazeSelected.forEach(idx => {
            document.getElementById(`maze-${idx}`)?.classList.remove('selected');
        });
        state.mazeSelected = [];
        setTimeout(() => cell.classList.remove('wrong-path'), 800);
        showFeedback(false, state.rounds[state.roundIndex].wordKey);
        setTimeout(() => hideFeedback(), 1200);
    }
}

function checkMaze() {
    const round = state.rounds[state.roundIndex];
    const wordKey = round.wordKey;
    if (state.mazeSelected.length < wordKey.length) {
        showFeedback(false, wordKey, 'Chọn chưa đủ chữ!');
        setTimeout(() => hideFeedback(), 1000);
    }
}

// --- GAME 8: Anagram ---
function renderAnagram(card, round, lv) {
    const wordKey = round.wordKey;
    const wd = findWord(wordKey);
    const letters = wordKey.split('');
    state.anagramPool  = shuffle([...letters]).map((l,i) => ({ id:i, letter:l, used:false }));
    state.anagramBuilt = [];

    card.innerHTML = `
        <div class="stage-pill ${STAGE_COLORS[lv.stage]}">Sắp xếp chữ</div>
        <div class="game-question">Sắp xếp chữ thành từ: <strong>${wd.t}</strong> ${wd.e}</div>
        <div class="anagram-built" id="anagram-built">
            <span style="color:#ccc;font-size:0.95rem">Nhấn chữ bên dưới để xếp vào đây</span>
        </div>
        <div class="anagram-pool" id="anagram-pool">
            ${state.anagramPool.map(t => `<div class="ana-tile pool-tile" id="apt-${t.id}" onclick="anagramPickPool(${t.id})">${t.letter}</div>`).join('')}
        </div>
    `;
    document.getElementById('btn-check').style.display = 'flex';
}

function anagramPickPool(id) {
    const tile = state.anagramPool.find(t => t.id === id);
    if (!tile || tile.used) return;
    tile.used = true;
    state.anagramBuilt.push({ poolId: id, letter: tile.letter });
    updateAnagramUI();
}

function anagramPickBuilt(builtIdx) {
    const item = state.anagramBuilt[builtIdx];
    if (!item) return;
    state.anagramPool.find(t => t.id === item.poolId).used = false;
    state.anagramBuilt.splice(builtIdx, 1);
    updateAnagramUI();
}

function updateAnagramUI() {
    const builtEl = document.getElementById('anagram-built');
    const poolEl  = document.getElementById('anagram-pool');
    if (state.anagramBuilt.length === 0) {
        builtEl.innerHTML = `<span style="color:#ccc;font-size:0.95rem">Nhấn chữ bên dưới để xếp vào đây</span>`;
    } else {
        builtEl.innerHTML = state.anagramBuilt.map((t,i) =>
            `<div class="ana-tile built-tile" onclick="anagramPickBuilt(${i})">${t.letter}</div>`
        ).join('');
    }
    state.anagramPool.forEach(t => {
        const el = document.getElementById(`apt-${t.id}`);
        if (!el) return;
        if (t.used) el.classList.add('used');
        else el.classList.remove('used');
    });
}

function checkAnagram() {
    const wordKey = state.rounds[state.roundIndex].wordKey;
    const built = state.anagramBuilt.map(t => t.letter).join('');
    if (built === wordKey) {
        document.querySelectorAll('.built-tile').forEach(el => {
            el.style.background = '#e8f5e9';
            el.style.borderColor = 'var(--success)';
            el.style.color = 'var(--success)';
        });
        showFeedback(true, wordKey);
        setTimeout(() => { hideFeedback(); nextRound(); }, 1300);
    } else {
        state.errors++;
        loseLife();
        document.querySelectorAll('.built-tile').forEach(el => {
            el.style.background = '#ffebee';
            el.style.borderColor = 'var(--error)';
            el.style.color = 'var(--error)';
        });
        showFeedback(false, wordKey);
        setTimeout(() => {
            hideFeedback();
            updateAnagramUI();
        }, 1600);
    }
}

// --- GAME 9: Story ---
function renderStory(card, round, lv) {
    const s = round.story;
    const parts = s.sentence.split('___');
    const blankHtml = `<span class="story-blank" id="story-blank">${s.blank ? '' : '&nbsp;&nbsp;&nbsp;&nbsp;'}</span>`;

    card.innerHTML = `
        <div class="stage-pill ${STAGE_COLORS[lv.stage]}">Mini Story</div>
        <div class="game-question">Điền từ đúng vào chỗ trống</div>
        <div class="big-image">${s.emoji}</div>
        <div class="story-text">${parts[0]}${blankHtml}${parts[1] || ''}</div>
        <div class="options-grid cols-3" style="margin-top:16px">
            ${s.options.map(o => {
                const wd = findWord(o);
                return `<button class="option-btn" style="flex-direction:column;gap:4px;font-size:1.2rem" onclick="selectStoryOption(this,'${o}','${s.blank}')">
                    <span style="font-size:1.8rem">${wd?.e || ''}</span>
                    <span>${o}</span>
                </button>`;
            }).join('')}
        </div>
    `;
}

function selectStoryOption(btn, chosen, target) {
    disableOptions();
    const blank = document.getElementById('story-blank');
    blank.textContent = chosen;
    if (chosen === target) {
        blank.style.borderBottomColor = 'var(--success)';
        blank.style.color = 'var(--success)';
        btn.classList.add('correct');
        showFeedback(true, target);
        setTimeout(() => { hideFeedback(); nextRound(); }, 1400);
    } else {
        blank.style.borderBottomColor = 'var(--error)';
        blank.style.color = 'var(--error)';
        btn.classList.add('wrong');
        state.errors++;
        loseLife();
        document.querySelectorAll('.option-btn').forEach(b => {
            if (b.textContent.includes(target)) b.classList.add('correct');
        });
        showFeedback(false, target);
        setTimeout(() => { hideFeedback(); nextRound(); }, 1700);
    }
}

// =====================================================
//  CHECK BUTTON DISPATCH
// =====================================================
function checkAnswer() {
    const lv = state.currentLevel;
    switch (lv.type) {
        case 'build-word':    checkBuildWord(); break;
        case 'missing-letter':checkMissingLetter(); break;
        case 'maze':          checkMaze(); break;
        case 'anagram':       checkAnagram(); break;
    }
}

// =====================================================
//  NEXT ROUND / GAME FLOW
// =====================================================
function nextRound() {
    state.roundIndex++;
    if (state.roundIndex >= state.rounds.length) {
        endLevel();
    } else {
        renderRound();
    }
}

function loseLife() {
    if (state.lives > 0) state.lives--;
    renderLives();
    if (state.lives === 0) {
        setTimeout(() => {
            endLevel(true);
        }, 1800);
    }
}

function renderLives() {
    const el = document.getElementById('lives-display');
    let html = '';
    for (let i = 0; i < 3; i++) html += i < state.lives ? '❤️' : '🖤';
    el.innerHTML = html;
}

function endLevel(failed = false) {
    hideFeedback();
    const lv = state.currentLevel;
    const errors = state.errors;
    const totalRounds = state.rounds.length;
    const stars = failed ? 0 : errors === 0 ? 3 : errors <= 1 ? 2 : errors <= 3 ? 1 : 0;

    if (stars > 0) {
        const prev = state.progress[lv.id]?.stars || 0;
        state.progress[lv.id] = { stars: Math.max(prev, stars) };
        saveProgress();
    }

    const overlay = document.getElementById('lc-overlay');
    document.getElementById('lc-title').textContent = stars >= 3 ? '⭐ Super gemacht!' : stars >= 2 ? '🎉 Sehr gut!' : stars === 1 ? '👍 Gut!' : '😢 Noch mal versuchen!';
    document.getElementById('lc-stars').textContent = stars > 0 ? '⭐'.repeat(stars) : '💔';
    document.getElementById('lc-word').textContent = `Level ${lv.id}: ${lv.title}`;
    const nextBtn = document.getElementById('btn-next-level');
    const nextLv = LEVELS.find(l => l.id === lv.id + 1);
    nextBtn.style.display = stars > 0 && nextLv ? 'flex' : 'none';
    overlay.classList.add('show');
}

function repeatLevel() {
    document.getElementById('lc-overlay').classList.remove('show');
    startLevel(state.currentLevel.id);
}

function nextLevel() {
    document.getElementById('lc-overlay').classList.remove('show');
    const nextId = state.currentLevel.id + 1;
    if (nextId <= 20) startLevel(nextId);
    else showMap();
}

// =====================================================
//  FEEDBACK OVERLAY
// =====================================================
function showFeedback(correct, word, msg) {
    const wd = findWord(word);
    const overlay = document.getElementById('feedback-overlay');
    document.getElementById('fb-icon').textContent  = correct ? (wd?.e || '✅') : '❌';
    document.getElementById('fb-title').textContent = correct ? 'Richtig! 🎉'  : 'Falsch!';
    document.getElementById('fb-sub').textContent   = msg || (correct ? `Das ist ${wd?.t || word}` : `Die Antwort: ${word}`);
    overlay.classList.add('show');
}

function hideFeedback() {
    document.getElementById('feedback-overlay').classList.remove('show');
}

// =====================================================
//  SPEECH
// =====================================================
function speakLetter(letter) {
    // Map German letters to phonetic pronunciation for SpeechSynthesis
    const phonetics = {
        'A':'ah','B':'beh','C':'tseh','D':'deh','E':'eh','F':'ef',
        'G':'geh','H':'hah','I':'ih','J':'yot','K':'kah','L':'el',
        'M':'em','N':'en','O':'oh','P':'peh','Q':'kuh','R':'er',
        'S':'es','T':'teh','U':'uh','V':'fau','W':'veh','X':'iks',
        'Y':'üpsilon','Z':'tset','Ä':'ä','Ö':'ö','Ü':'ü',
    };
    speak(phonetics[letter] || letter, 'de-DE', 0.85);
}

function speakWord(word) {
    speak(word, 'de-DE', 0.85);
}

function getGermanVoice() {
    const voices = window.speechSynthesis.getVoices();
    // Prefer exact de-DE, then any de-* voice
    return voices.find(v => v.lang === 'de-DE')
        || voices.find(v => v.lang.startsWith('de'))
        || null;
}

function speak(text, lang, rate) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'de-DE';
    u.rate = rate || 0.85;
    u.pitch = 1.1;
    const voice = getGermanVoice();
    if (voice) u.voice = voice;
    window.speechSynthesis.speak(u);
}

// =====================================================
//  HELPERS
// =====================================================
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}
function randInt(min, max) { return min + Math.floor(Math.random() * (max - min + 1)); }

function findWord(key) {
    return ALL_WORDS.find(w => w.w === key);
}

function disableOptions() {
    document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
}

document.addEventListener('DOMContentLoaded', () => {
    // Pre-warm speech synthesis
    if (window.speechSynthesis) {
        window.speechSynthesis.getVoices();
        window.speechSynthesis.addEventListener('voiceschanged', () => {});
    }
});
